<!DOCTYPE html>

<head>

  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">

<nav>

<div class="container">


<div class="card">
  <h3>Upload Voice Sample</h3>
  <input type="file" id="audioFile" accept="audio/*">
  <br><br>
  <button onclick="detectPanic()">Analyze Audio</button>
</div>

  <!-- <div class="card">
    <h3>Voice Input Simulation</h3>

  </div> -->

  <div class="card">
    <h3>Detected Emotion</h3>
    <p id="emotion">-</p>
  </div>

  <div class="card">
    <h3>Panic Score</h3>
    <p id="score">-</p>
  </div>

  <div class="card">
    <h3>Status</h3>
    <p id="status">Waiting...</p>
  </div>

</div>

<script src="script.js"></script>
