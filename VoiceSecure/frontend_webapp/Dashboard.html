<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav>
  <h2>Dashboard</h2>
  <a href="index.html"><button>Home</button></a>
</nav>

<div class="container">

  <div class="card">
    <h3>Upload Voice Sample</h3>
    <input type="file" id="audioFile" accept=".wav">
    <br><br>
    <!-- <button id="analyzeBtn" type="button">Analyze Audio</button> -->
     <button id="analyzeBtn" onclick="uploadAudio()">Analyze Audio</button>
  </div>

  <div class="card">
    <p id="result">Upload an audio file to analyze.</p>
  </div>

  <div class="card">
    <h3>Detected Emotion</h3>
    <p id="emotion">-</p>
  </div>

  <div class="card">
    <h3>Panic Score</h3>
    <p id="score">-</p>
  </div>

  <div class="card">
    <h3>Status</h3>
    <p id="status">Waiting...</p>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
